worker_processes 1;

events {
    worker_connections 64;
}

http {
    server {
        listen 8080;

        location = /health {
            default_type text/plain;
            return 200 "ok\n";
        }

        location / {
            default_type application/json;
            add_header X-Upstream-Id     "sb-3"             always;
            add_header X-Upstream-Path   $request_uri       always;
            add_header X-Upstream-Method $request_method    always;
            add_header X-Request-Id      $http_x_request_id always;
            add_header X-Upgrade         $http_upgrade      always;
            add_header X-Connection      $http_connection   always;
            return 200 '{"upstream":"sb-3"}';
        }
    }
}
