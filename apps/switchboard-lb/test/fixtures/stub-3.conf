worker_processes 1;

events {
    worker_connections 64;
}

http {
    server {
        listen 8080;

        location = /health {
            default_type text/plain;
            return 200 "ok\n";
        }

        location / {
            default_type application/json;
            add_header X-Upstream-Id "sb-3" always;
            return 200 '{"upstream":"sb-3"}';
        }
    }
}
