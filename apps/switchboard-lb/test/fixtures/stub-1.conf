worker_processes 1;

events {
    worker_connections 64;
}

http {
    server {
        listen 8080;

        location = /health {
            default_type text/plain;
            return 200 "ok\n";
        }

        # Real WebSocket echo handler used by the M3 reload-survival test.
        # Greets the client with this stub's id, then echoes any text/binary
        # frame back. Replies to pings, closes cleanly on close.
        location = /graphql/subscriptions {
            access_log off;
            content_by_lua_block {
                local ws_server = require("resty.websocket.server")
                local wb, err = ws_server:new{
                    timeout         = 60000,
                    max_payload_len = 65535,
                }
                if not wb then
                    ngx.log(ngx.ERR, "ws_server:new failed: ", err)
                    return ngx.exit(444)
                end
                local ok = wb:send_text('{"upstream":"sb-1"}')
                if not ok then return ngx.exit(444) end
                while true do
                    local data, typ = wb:recv_frame()
                    if not data then return ngx.exit(444) end
                    if typ == "close" then
                        wb:send_close()
                        return
                    elseif typ == "text" or typ == "binary" then
                        wb:send_text(data)
                    elseif typ == "ping" then
                        wb:send_pong(data)
                    end
                end
            }
        }

        location / {
            default_type application/json;
            add_header X-Upstream-Id     "sb-1"             always;
            add_header X-Upstream-Path   $request_uri       always;
            add_header X-Upstream-Method $request_method    always;
            add_header X-Request-Id      $http_x_request_id always;
            add_header X-Upgrade         $http_upgrade      always;
            add_header X-Connection      $http_connection   always;
            return 200 '{"upstream":"sb-1"}';
        }
    }
}
