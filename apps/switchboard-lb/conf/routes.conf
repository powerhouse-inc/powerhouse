server {
    listen 8080;
    client_max_body_size 256k;
    # Must match client_max_body_size. If smaller, read_body() spools to a
    # temp file and get_body_data() returns nil, breaking the Lua extractor.
    client_body_buffer_size 256k;

    access_log /usr/local/openresty/nginx/logs/access.log lb_kv;

    # Route class: Subscription — WebSocket upgrade.
    # Exact match wins over the /graphql prefix below.
    location = /graphql/subscriptions {
        proxy_pass          http://switchboards;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_read_timeout  1h;
        proxy_send_timeout  1h;
        proxy_next_upstream off;

        proxy_intercept_errors on;
        error_page 502 504 = @no_backend;
    }

    # Route class: Document-scoped — supergraph, reactor subgraph,
    # per-model subgraphs, /graphql/stream, /graphql/<name>/stream.
    # M2: rewrite_by_lua reads the body and sets $doc_id; upstream picks
    # the backend via hash $doc_id consistent once upstreams.conf flips.
    location /graphql {
        rewrite_by_lua_block { require("route").from_body() }
        proxy_pass          http://switchboards;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        proxy_next_upstream off;

        proxy_intercept_errors on;
        error_page 502 504 = @no_backend;
    }

    # Route class: Drive metadata (REST). Any healthy backend is correct.
    location ~ ^/d/[^/]+$ {
        proxy_pass          http://switchboards;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        proxy_next_upstream off;

        proxy_intercept_errors on;
        error_page 502 504 = @no_backend;
    }

    # Route class: Global — served locally, no upstream.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Internal: dump lua-resty-upstream-healthcheck peer state. Used by
    # m3.sh to poll for up/down transitions instead of time-waiting.
    # Localhost-only — reach via `docker exec <lb> curl http://127.0.0.1:8080/__hc/status`.
    # M4 will move this onto the dedicated :9090 metrics listener.
    location = /__hc/status {
        allow 127.0.0.1;
        deny  all;
        access_log off;
        content_by_lua_block {
            ngx.header["Content-Type"] = "text/plain"
            ngx.print(require("healthcheck").status())
        }
    }

    # Translate "no live upstream" / upstream timeout into 503 per §4.5.
    # nginx defaults to 502 when the only ring slot is marked down by the
    # healthcheck, but the LB's contract with clients is 503 ("backend
    # unavailable, retry later"). The underlying nginx status survives in
    # the access log as $upstream_status — log inspection tells the cause,
    # the wire response just says "unavailable".
    location @no_backend {
        internal;
        default_type application/json;
        return 503 '{"error":"backend unavailable for this request"}';
    }
}
