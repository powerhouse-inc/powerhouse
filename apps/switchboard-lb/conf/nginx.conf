worker_processes auto;

events {
    worker_connections 1024;
}

http {
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # $doc_id is set in M2 (Lua body inspection). Declared here because
    # log_format.conf references $doc_id; removing the map causes nginx
    # to fail config parse with "unknown variable". The map stays across
    # every milestone; only its value changes (empty until M2).
    map "" $doc_id {
        default "";
    }

    include /usr/local/openresty/nginx/conf/log_format.conf;
    include /usr/local/openresty/nginx/conf/upstreams.conf;
    include /usr/local/openresty/nginx/conf/routes.conf;
}
