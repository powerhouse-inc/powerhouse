worker_processes auto;

events {
    worker_connections 1024;
}

http {
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # Shared state for lua-resty-upstream-healthcheck. The library uses this
    # dict to elect one worker per cycle to actually probe and to publish
    # peer up/down state to all workers. Sized for 3 backends with headroom.
    lua_shared_dict healthcheck 1m;

    # Shared state for nginx-lua-prometheus. Sized for the M4 metric set
    # (~100 distinct time-series across the pair — class × backend × status
    # for requests, class × backend × bucket for the histogram) plus the
    # library's own index.
    lua_shared_dict prometheus_metrics 2m;

    # Active health probes against the switchboards upstream. Spawns once per
    # worker; the library's internal locking ensures only one worker probes
    # per interval. Defaults: 2s interval, 1s timeout, fall=3, rise=2 → ~6s
    # to mark a dead backend down, ~4s to bring it back. See lua/healthcheck.lua.
    # metrics.run() registers the M4 prometheus counters/histogram in the
    # same per-worker init phase. See lua/metrics.lua.
    init_worker_by_lua_block {
        require("healthcheck").run()
        require("metrics").run()
    }

    # Default-value declaration for $doc_id. lua/route.lua sets the value
    # in the rewrite phase for /graphql; every other location leaves it
    # empty (the default below). The map exists so log_format.conf can
    # reference $doc_id unconditionally — without it, nginx fails config
    # parse with "unknown variable" on routes the Lua never runs on.
    map "" $doc_id {
        default "";
    }

    # Default-value declaration for $route_class. routes.conf sets the value
    # per location ("graphql"|"drive"|"health"|"subscription") so the
    # server-level log_by_lua_block can read it unconditionally. Same
    # rationale as $doc_id above.
    map "" $route_class {
        default "";
    }

    include /usr/local/openresty/nginx/conf/log_format.conf;
    include /usr/local/openresty/nginx/conf/upstreams.conf;
    include /usr/local/openresty/nginx/conf/routes.conf;
    include /usr/local/openresty/nginx/conf/metrics.conf;
}
