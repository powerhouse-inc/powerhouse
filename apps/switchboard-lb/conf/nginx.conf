worker_processes auto;

events {
    worker_connections 1024;
}

http {
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # Default-value declaration for $doc_id. lua/route.lua sets the value
    # in the rewrite phase for /graphql; every other location leaves it
    # empty (the default below). The map exists so log_format.conf can
    # reference $doc_id unconditionally — without it, nginx fails config
    # parse with "unknown variable" on routes the Lua never runs on.
    map "" $doc_id {
        default "";
    }

    include /usr/local/openresty/nginx/conf/log_format.conf;
    include /usr/local/openresty/nginx/conf/upstreams.conf;
    include /usr/local/openresty/nginx/conf/routes.conf;
}
