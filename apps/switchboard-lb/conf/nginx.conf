worker_processes auto;

events {
    worker_connections 1024;
}

http {
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # $doc_id is populated in M1 (path capture) and M2 (Lua body inspection).
    # Declared here so `hash $doc_id consistent` in upstreams.conf has a
    # defined variable even before any route sets it.
    map "" $doc_id {
        default "";
    }

    include /usr/local/openresty/nginx/conf/log_format.conf;
    include /usr/local/openresty/nginx/conf/upstreams.conf;
    include /usr/local/openresty/nginx/conf/routes.conf;
}
