# Internal metrics and observability listener (M4).
#
# Bound to 127.0.0.1 — reachable only via `docker exec <lb> curl ...`.
# Never exposed on :8080. Not published in docker-compose.yml.
# See ARCHITECTURE.md §6.4 and §8 M4.

server {
    listen 127.0.0.1:9090;

    # Prometheus scrape endpoint. lua/metrics.lua holds the metric handles
    # initialised in init_worker_by_lua_block; collect() renders the text
    # format from the cross-worker lua_shared_dict prometheus_metrics.
    location = /metrics {
        access_log off;
        content_by_lua_block {
            require("metrics").collect()
        }
    }

    # Healthcheck peer state — moved here from :8080/__hc/status in M4.
    # Reach via: docker exec <lb-container> curl http://127.0.0.1:9090/__hc/status
    location = /__hc/status {
        access_log off;
        content_by_lua_block {
            ngx.header["Content-Type"] = "text/plain"
            ngx.print(require("healthcheck").status())
        }
    }

    location / { return 404; }
}
