upstream switchboards {
    # M2: consistent hashing over $doc_id, which lua/route.lua sets in
    # the rewrite phase for /graphql requests. Non-/graphql paths hit
    # other locations that don't run the Lua, so $doc_id stays empty —
    # all such requests hash to the same server. That's acceptable for
    # /d/:drive (REST metadata, any backend is fine).
    hash $doc_id consistent;

    # max_fails=0 disables nginx's *passive* mark-down. We don't want any
    # mechanism — passive or active — to remove a peer from the ring at
    # selection time, because `hash ... consistent` skips down peers and
    # that silently re-routes a pinned doc to a different backend (split
    # brain). With max_fails=0 the hash module always picks the originally-
    # hashed peer; if it's dead the proxy_pass fails at TCP, nginx returns
    # 502, and routes.conf's @no_backend turns it into a 503. See §4.1.
    server sb-1:8080 max_fails=0;
    server sb-2:8080 max_fails=0;
    server sb-3:8080 max_fails=0;

    keepalive 64;
}
