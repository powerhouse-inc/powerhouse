upstream switchboards {
    # M2: consistent hashing over $doc_id, which lua/route.lua sets in
    # the rewrite phase for /graphql requests. Non-/graphql paths hit
    # other locations that don't run the Lua, so $doc_id stays empty —
    # all such requests hash to the same server. That's acceptable for
    # /d/:drive (REST metadata, any backend is fine).
    hash $doc_id consistent;

    server sb-1:8080 max_fails=3 fail_timeout=10s;
    server sb-2:8080 max_fails=3 fail_timeout=10s;
    server sb-3:8080 max_fails=3 fail_timeout=10s;

    keepalive 64;
}
