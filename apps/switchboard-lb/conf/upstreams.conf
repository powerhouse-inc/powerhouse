upstream switchboards {
    # M1: interim non-pinning balancer. M2 flips this to
    # `hash $doc_id consistent;` atomically with the Lua that populates
    # $doc_id in the rewrite phase.
    least_conn;

    server sb-1:8080 max_fails=3 fail_timeout=10s;
    server sb-2:8080 max_fails=3 fail_timeout=10s;
    server sb-3:8080 max_fails=3 fail_timeout=10s;

    keepalive 64;
}
