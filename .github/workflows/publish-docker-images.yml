name: Build and Publish Docker Images

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  HARBOR_REGISTRY: cr.vetra.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: registry
            context: ./packages/registry
          - image: academy
            context: ./apps/academy
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Get tags
        run: git fetch --tags origin
      - name: Set last tag
        id: get-tag
        run: |
          TAG=$(git for-each-ref --sort=creatordate --format '%(tag)' refs/tags | tail -n 1)
          echo "GITHUB_TAG=$TAG" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Set image paths
        run: |
          HARBOR_PROJECT="${GITHUB_REPOSITORY//\//-}"
          if [ "${{ matrix.image }}" = "academy" ]; then
            echo "HARBOR_PATH=academy/academy" >> $GITHUB_ENV
          else
            echo "HARBOR_PATH=${HARBOR_PROJECT}/${{ matrix.image }}" >> $GITHUB_ENV
          fi
      - name: Determine additional tag
        run: |
          if [[ "${{ env.GITHUB_TAG }}" == *"-dev."* ]]; then
            echo "ADDITIONAL_TAG=dev" >> $GITHUB_ENV
          elif [[ "${{ env.GITHUB_TAG }}" == *"-staging."* ]]; then
            echo "ADDITIONAL_TAG=staging" >> $GITHUB_ENV
          elif [[ "${{ env.GITHUB_TAG }}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ADDITIONAL_TAG=latest" >> $GITHUB_ENV
          else
            echo "ADDITIONAL_TAG=" >> $GITHUB_ENV
          fi
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PATNAME }}

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Copy pnpm-workspace.yaml into Docker context
        if: matrix.image == 'registry'
        run: cp pnpm-workspace.yaml ${{ matrix.context }}/pnpm-workspace.yaml

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:${{ env.GITHUB_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:${{ env.ADDITIONAL_TAG }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PATH }}:${{ env.GITHUB_TAG }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PATH }}:${{ env.ADDITIONAL_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ matrix.image == 'academy' && format('TAG={0}', env.GITHUB_TAG) || '' }}

  update-k8s-academy:
    name: Update Academy Image in K8s Hosting
    needs: build
    if: ${{ needs.build.outputs.tag != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Determine target environments
        id: env
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          if [[ "$TAG" == *"-dev."* ]]; then
            echo "targets=dev" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-staging."* ]]; then
            echo "targets=staging academy" >> $GITHUB_OUTPUT
          else
            echo "Skipping k8s update for production tags"
          fi

      - name: Update academy image tag in k8s-hosting
        if: ${{ steps.env.outputs.targets != '' }}
        env:
          TAG: ${{ needs.build.outputs.tag }}
          TARGETS: ${{ steps.env.outputs.targets }}
          K8S_REPO_PAT: ${{ secrets.K8S_REPO_PAT }}
        run: |
          git clone "https://x-access-token:${K8S_REPO_PAT}@github.com/powerhouse-inc/powerhouse-k8s-hosting.git"
          cd powerhouse-k8s-hosting

          git config user.name "Github Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for TARGET_ENV in $TARGETS; do
            VALUES_FILE="tenants/${TARGET_ENV}/powerhouse-values.yaml"
            # Update academy image tag (matches the line after academy's repository line)
            sed -i '/repository: cr.vetra.io\/academy\/academy/{n;s/\(.*tag: \).*/\1'"${TAG}"'/}' "$VALUES_FILE"
            git add "$VALUES_FILE"
          done

          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(academy): update academy image tag to ${TAG}"
          git push
