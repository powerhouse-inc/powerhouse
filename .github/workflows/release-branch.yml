name: Release Branch

on:
  workflow_dispatch:
    inputs:
      release_mode:
        type: choice
        description: "Specify what type of release to perform. NOTE: `prerelease` is not a valid option for releasing to production."
        options:
          - prerelease
          - patch
          - minor
          - major
        default: prerelease
      dry_run:
        type: boolean
        default: false
      verbose:
        type: boolean
        default: false
      skip_publish:
        type: boolean
        default: false
      skip_changelog:
        type: boolean
        default: false
      skip_stage:
        type: boolean
        default: false
      skip_commit:
        type: boolean
        default: false
      skip_push:
        type: boolean
        default: false
      skip_git_tag:
        type: boolean
        default: false
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  packages: write
  id-token: write

# Serialize releases per branch. Two simultaneous releases would both bump
# versions, both publish to npm (one claiming the next dev.X tag, the other
# failing on republish), and race on git push. Queue rather than cancel —
# releases shouldn't be aborted mid-publish.
concurrency:
  group: release-monorepo-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Release packages in monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Log inputs
        run: |
          echo "release_mode=${{ inputs.release_mode }}"
          echo "dry_run=${{ inputs.dry_run }}"
          echo "verbose=${{ inputs.verbose }}"
          echo "skip_publish=${{ inputs.skip_publish }}"
          echo "skip_changelog=${{ inputs.skip_changelog }}"
          echo "skip_stage=${{ inputs.skip_stage }}"
          echo "skip_commit=${{ inputs.skip_commit }}"
          echo "skip_push=${{ inputs.skip_push }}"
          echo "skip_git_tag=${{ inputs.skip_git_tag }}"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: General setup
        uses: ./.github/actions/setup

      - name: Install release tool dependencies
        run: bun install
        working-directory: releases

      - name: Set git config
        run: |
          git config user.name "Github Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # pnpm v11 stopped reading npm_config_* env vars (including the
      # NPM_CONFIG_USERCONFIG that actions/setup-node writes), so the temp
      # .npmrc with the auth token reference is invisible to `pnpm publish`.
      # Write the token to ~/.npmrc directly so pnpm picks it up by default.
      - name: Configure npm auth for pnpm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc

      - name: Run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          PNPM_CONFIG_PROVENANCE: "true"
        run: |
          pnpm run run-release -- \
          --release-mode="${{ inputs.release_mode || 'prerelease' }}" \
          --dry-run="${{ inputs.dry_run == true }}" \
          --verbose="${{ inputs.verbose == true }}" \
          --skip-publish="${{ inputs.skip_publish == true }}" \
          --skip-changelog="${{ inputs.skip_changelog == true }}" \
          --skip-stage="${{ inputs.skip_stage == true }}" \
          --skip-commit="${{ inputs.skip_commit == true }}" \
          --skip-push="${{ inputs.skip_push == true }}" \
          --skip-git-tag="${{ inputs.skip_git_tag == true }}"

      # Install sentry-cli globally so the subsequent steps can invoke it
      # reliably (npx-based invocation had resolution issues).
      - name: Install sentry-cli
        if: ${{ inputs.dry_run != true && inputs.skip_publish != true }}
        run: curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION=2.58.5 bash

      # Upload source maps to self-hosted Sentry so production stack traces
      # map back to original TypeScript source in this repo.
      - name: Upload source maps to Sentry
        if: ${{ inputs.dry_run != true && inputs.skip_publish != true }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
        run: |
          set -euo pipefail
          VERSION=$(git tag --sort=-v:refname --points-at HEAD | head -1)
          if [ -z "$VERSION" ]; then
            echo "No new tag at HEAD, skipping Sentry upload"
            exit 0
          fi
          echo "Sentry release: $VERSION"

          for proj in powerhouse ph-cli; do
            sentry-cli releases new -p "$proj" "$VERSION" || true
          done
          sentry-cli releases set-commits "$VERSION" --auto -p powerhouse || true

          for dir in apps/connect/dist apps/switchboard/dist apps/academy/dist \
                     packages/reactor-api/dist packages/switchboard/dist; do
            [ -d "$dir" ] || continue
            sentry-cli sourcemaps upload \
              --release "$VERSION" \
              --project powerhouse \
              "$dir" || true
          done

          for dir in clis/ph-cli/dist clis/ph-cmd/dist; do
            [ -d "$dir" ] || continue
            sentry-cli sourcemaps upload \
              --release "$VERSION" \
              --project ph-cli \
              "$dir" || true
          done

          for proj in powerhouse ph-cli; do
            sentry-cli releases finalize -p "$proj" "$VERSION" || true
          done

  publish-ph-binaries:
    name: Build and publish ph binaries
    needs: release
    # Need a real published release (with tag) to attach assets to.
    if: ${{ inputs.dry_run != true && inputs.skip_publish != true && inputs.skip_git_tag != true && inputs.skip_push != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Need the tag the release job just pushed.
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: General setup
        uses: ./.github/actions/setup

      - name: Resolve release tag at HEAD
        id: tag
        run: |
          set -euo pipefail
          git fetch --tags --force
          TAG=$(git tag --sort=-v:refname --points-at HEAD | head -1)
          if [ -z "$TAG" ]; then
            echo "::notice::No release tag at HEAD — skipping binary publish"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compile binaries
        if: steps.tag.outputs.tag != ''
        working-directory: clis/ph-cmd
        env:
          CLI_VERSION: ${{ steps.tag.outputs.version }}
          CLI_GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # bun-darwin-arm64 etc. all cross-compile from linux-x64.
          targets=(
            "bun-darwin-arm64:ph-darwin-arm64"
            "bun-darwin-x64:ph-darwin-x64"
            "bun-linux-arm64:ph-linux-arm64"
            "bun-linux-x64:ph-linux-x64"
            "bun-windows-x64:ph-windows-x64.exe"
          )
          for entry in "${targets[@]}"; do
            target="${entry%%:*}"
            out="${entry##*:}"
            echo "▶ compiling $out ($target)"
            bun build ./src/cli.ts \
              --compile \
              --target="$target" \
              --outfile="artifacts/$out" \
              --define CLI_VERSION="\"${CLI_VERSION}\"" \
              --define CLI_GIT_SHA="\"${CLI_GIT_SHA}\""
          done
          ( cd artifacts && sha256sum ph-* > checksums.txt )
          ls -lh artifacts

      - name: Upload binaries to GitHub Release
        if: steps.tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        working-directory: clis/ph-cmd
        run: |
          set -euo pipefail
          # nx-release normally creates the GitHub release alongside the
          # changelog. Create it ourselves if it isn't there yet (e.g. when
          # skip_changelog was set), so the upload below has somewhere to land.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes ""
          fi
          # --clobber lets reruns replace the same file names.
          gh release upload "$TAG" \
            artifacts/ph-darwin-arm64 \
            artifacts/ph-darwin-x64 \
            artifacts/ph-linux-arm64 \
            artifacts/ph-linux-x64 \
            artifacts/ph-windows-x64.exe \
            artifacts/checksums.txt \
            --clobber

  publish-docker:
    name: Build and Publish Docker Images
    needs: release
    if: ${{ inputs.dry_run != true }}
    uses: "./.github/workflows/publish-docker-images.yml"
    secrets: inherit

  test-package-managers:
    name: Test Package Managers
    needs: release
    if: ${{ inputs.dry_run != true && inputs.skip_publish != true }}
    uses: "./.github/workflows/test-package-managers.yml"
    with:
      tag: ${{ github.ref_name == 'main' && 'dev' || startsWith(github.ref_name, 'release/staging') && 'staging' || startsWith(github.ref_name, 'release/production') && 'latest' || 'dev' }}
    secrets: inherit

  determine-downstream-params:
    name: Determine Downstream Parameters
    needs: release
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.params.outputs.channel }}
      version: ${{ steps.params.outputs.version }}
      skip: ${{ steps.params.outputs.skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine channel and version
        id: params
        run: |
          # Determine channel based on branch
          # main = dev, release/staging/* = staging, release/production/* = latest
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "main" ]]; then
            CHANNEL="dev"
          elif [[ "$BRANCH" == release/staging/* ]]; then
            CHANNEL="staging"
          elif [[ "$BRANCH" == release/production/* ]]; then
            CHANNEL="latest"
          else
            echo "Unknown branch pattern: $BRANCH, skipping downstream trigger"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get the latest version tag for this channel
          if [[ "$CHANNEL" == "dev" ]]; then
            VERSION=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$" | head -1)
          elif [[ "$CHANNEL" == "staging" ]]; then
            VERSION=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+-staging\.[0-9]+$" | head -1)
          else
            VERSION=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | head -1)
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Could not determine version for channel $CHANNEL"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Triggering downstream with channel=$CHANNEL version=$VERSION"

  trigger-downstream:
    name: Trigger Downstream Packages
    needs: determine-downstream-params
    if: ${{ needs.determine-downstream-params.outputs.skip != 'true' }}
    uses: ./.github/workflows/trigger-downstream-packages.yml
    with:
      version: ${{ needs.determine-downstream-params.outputs.version }}
      channel: ${{ needs.determine-downstream-params.outputs.channel }}
      dry-run: false
    secrets: inherit

  notify-discord:
    name: Notify Discord on Failure
    if: ${{ always() && (needs.release.result == 'failure' || needs.publish-docker.result == 'failure' || needs.test-package-managers.result == 'failure' || needs.determine-downstream-params.result == 'failure' || needs.trigger-downstream.result == 'failure') }}
    needs:
      [
        release,
        publish-docker,
        test-package-managers,
        determine-downstream-params,
        trigger-downstream,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Download test step results
        if: ${{ needs.test-package-managers.result == 'failure' }}
        uses: actions/download-artifact@v4
        with:
          pattern: step-results-*
          path: /tmp/step-results
          merge-multiple: true

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_FAILURES }}
        run: |
          FAILURES=""
          [ "${{ needs.release.result }}" = "failure" ] && FAILURES="${FAILURES}• release\n"
          [ "${{ needs.publish-docker.result }}" = "failure" ] && FAILURES="${FAILURES}• publish-docker\n"
          [ "${{ needs.determine-downstream-params.result }}" = "failure" ] && FAILURES="${FAILURES}• determine-downstream-params\n"
          [ "${{ needs.trigger-downstream.result }}" = "failure" ] && FAILURES="${FAILURES}• trigger-downstream\n"

          if [ "${{ needs.test-package-managers.result }}" = "failure" ]; then
            FAILURES="${FAILURES}• test-package-managers\n"
            if [ -d "/tmp/step-results" ]; then
              for f in /tmp/step-results/*.txt; do
                [ ! -f "$f" ] && continue
                PM=$(basename "$f" .txt)
                STEPS=$(cat "$f" | sed '/^$/d' | sed 's/^/    ◦ /')
                FAILURES="${FAILURES}  **${PM}:**\n${STEPS}\n"
              done
            fi
          fi

          curl -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" -d '{
            "embeds": [{
              "title": "⚠️ Release Pipeline Failed",
              "description": "**Branch:** `${{ github.ref_name }}`\n\n**Failed jobs:**\n'"${FAILURES}"'\n**Run:** [`release-branch`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
              "color": 16711680
            }]
          }'
