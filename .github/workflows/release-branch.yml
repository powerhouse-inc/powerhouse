name: Release Branch

on:
  workflow_dispatch:
    inputs:
      release_mode:
        type: choice
        description: "Specify what type of release to perform. NOTE: `prerelease` is not a valid option for releasing to production."
        options:
          - prerelease
          - patch
          - minor
          - major
        default: prerelease
      dry_run:
        type: boolean
        default: false
      verbose:
        type: boolean
        default: false
      skip_publish:
        type: boolean
        default: false
      skip_changelog:
        type: boolean
        default: false
      skip_stage:
        type: boolean
        default: false
      skip_commit:
        type: boolean
        default: false
      skip_push:
        type: boolean
        default: false
      skip_git_tag:
        type: boolean
        default: false
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release packages in monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NPM_CONFIG_PROVENANCE: true
    steps:
      - name: Log inputs
        run: |
          echo "release_mode=${{ inputs.release_mode }}"
          echo "dry_run=${{ inputs.dry_run }}"
          echo "verbose=${{ inputs.verbose }}"
          echo "skip_publish=${{ inputs.skip_publish }}"
          echo "skip_changelog=${{ inputs.skip_changelog }}"
          echo "skip_stage=${{ inputs.skip_stage }}"
          echo "skip_commit=${{ inputs.skip_commit }}"
          echo "skip_push=${{ inputs.skip_push }}"
          echo "skip_git_tag=${{ inputs.skip_git_tag }}"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: General setup
        uses: ./.github/actions/setup

      - name: Install release tool dependencies
        run: bun install
        working-directory: releases

      - name: Set git config
        run: |
          git config user.name "Github Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
        run: |
          pnpm run run-release -- \
          --release-mode="${{ inputs.release_mode || 'prerelease' }}" \
          --dry-run="${{ inputs.dry_run == true }}" \
          --verbose="${{ inputs.verbose == true }}" \
          --skip-publish="${{ inputs.skip_publish == true }}" \
          --skip-changelog="${{ inputs.skip_changelog == true }}" \
          --skip-stage="${{ inputs.skip_stage == true }}" \
          --skip-commit="${{ inputs.skip_commit == true }}" \
          --skip-push="${{ inputs.skip_push == true }}" \
          --skip-git-tag="${{ inputs.skip_git_tag == true }}"

  publish-docker:
    name: Build and Publish Docker Images
    needs: release
    if: ${{ inputs.dry_run != true }}
    uses: "./.github/workflows/publish-docker-images.yml"
    secrets: inherit

  test-package-managers:
    name: Test Package Managers
    needs: release
    if: ${{ inputs.dry_run != true && inputs.skip_publish != true }}
    uses: "./.github/workflows/test-package-managers.yml"
    with:
      tag: ${{ github.ref_name == 'main' && 'dev' || startsWith(github.ref_name, 'release/staging') && 'staging' || startsWith(github.ref_name, 'release/production') && 'latest' || 'dev' }}
    secrets: inherit

  notify-discord-test-pm:
    name: Notify Discord on Package Manager Test Failure
    if: ${{ always() && needs.test-package-managers.result == 'failure' }}
    needs: [test-package-managers]
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_FAILURES }}
          DISCORD_USER_MAPPING: ${{ secrets.DISCORD_USER_MAPPING }}
        run: |
          DISCORD_USER=$(echo "$DISCORD_USER_MAPPING" | jq -r --arg GH_USER "${{ github.actor }}" '.[$GH_USER] // ""')
          MENTION_STRING=""
          if [ ! -z "$DISCORD_USER" ]; then
            MENTION_STRING="<@${DISCORD_USER}> "
          fi

          curl -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" -d '{
            "embeds": [{
              "title": "⚠️ Package Manager Tests Failed",
              "description": "**Author:** '"${MENTION_STRING}"'\n**Branch:** `${{ github.ref_name }}`\n**Failed job:** [`test-package-managers`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
              "color": 16711680
            }]
          }'

  determine-downstream-params:
    name: Determine Downstream Parameters
    needs: release
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.params.outputs.channel }}
      version: ${{ steps.params.outputs.version }}
      skip: ${{ steps.params.outputs.skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine channel and version
        id: params
        run: |
          # Determine channel based on branch
          # main = dev, release/staging/* = staging, release/production/* = latest
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "main" ]]; then
            CHANNEL="dev"
          elif [[ "$BRANCH" == release/staging/* ]]; then
            CHANNEL="staging"
          elif [[ "$BRANCH" == release/production/* ]]; then
            CHANNEL="latest"
          else
            echo "Unknown branch pattern: $BRANCH, skipping downstream trigger"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get the latest version tag for this channel
          if [[ "$CHANNEL" == "dev" ]]; then
            VERSION=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$" | head -1)
          elif [[ "$CHANNEL" == "staging" ]]; then
            VERSION=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+-staging\.[0-9]+$" | head -1)
          else
            VERSION=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | head -1)
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Could not determine version for channel $CHANNEL"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Triggering downstream with channel=$CHANNEL version=$VERSION"

  trigger-downstream:
    name: Trigger Downstream Packages
    needs: determine-downstream-params
    if: ${{ needs.determine-downstream-params.outputs.skip != 'true' }}
    uses: ./.github/workflows/trigger-downstream-packages.yml
    with:
      version: ${{ needs.determine-downstream-params.outputs.version }}
      channel: ${{ needs.determine-downstream-params.outputs.channel }}
      dry-run: false
    secrets: inherit
