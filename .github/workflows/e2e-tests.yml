name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual triggering for testing
  workflow_dispatch:

env:
  NX_ISOLATE_PLUGINS: false
  HUSKY: 0

concurrency:
  group: e2e-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vetra-e2e-tests:
    name: Run Vetra E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install-ci

      - name: Setup bun global install
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Build
        run: pnpm build

      - name: Re-link workspace bins now that dist files exist
        run: pnpm rebuild --recursive

      - name: Build packages that depend on generated binaries
        run: pnpm --filter=@powerhousedao/versioned-documents --no-bail run build

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: ./test/vetra-e2e

      - name: Run Playwright tests
        run: pnpm test:e2e:vetra

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vetra-playwright-report
          path: test/vetra-e2e/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vetra-test-results
          path: test/vetra-e2e/test-results/
          retention-days: 30

  vetra-e2e-worker-tests:
    name: Run Vetra E2E Tests (SharedWorker reactor)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install-ci

      - name: Setup bun global install
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Build
        run: pnpm build

      - name: Re-link workspace bins now that dist files exist
        run: pnpm rebuild --recursive

      - name: Build packages that depend on generated binaries
        run: pnpm --filter=@powerhousedao/versioned-documents --no-bail run build

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: ./test/vetra-e2e

      - name: Run Playwright tests (worker mode)
        run: pnpm test:e2e:vetra:worker

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vetra-worker-playwright-report
          path: test/vetra-e2e/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vetra-worker-test-results
          path: test/vetra-e2e/test-results/
          retention-days: 30

  package-e2e-tests:
    name: Run Package E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install-ci

      - name: Setup bun global install
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Build
        run: pnpm build

      - name: Re-link workspace bins now that dist files exist
        run: pnpm rebuild --recursive

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: ./test/package-e2e

      - name: Run package E2E flow
        run: pnpm test:e2e:package

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package-e2e-playwright-report
          path: test/package-e2e/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package-e2e-test-results
          path: test/package-e2e/test-results/
          retention-days: 30

  analytics-engine-integration-tests:
    name: Run Analytics Engine Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install-ci

      - name: Setup bun global install
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Build
        run: pnpm build

      - name: Re-link workspace bins now that dist files exist
        run: pnpm rebuild --recursive

      - name: Build packages that depend on generated binaries
        run: pnpm --filter=@powerhousedao/versioned-documents --no-bail run build

      - name: Install Playwright Browsers
        run: pnpm exec playwright install
        working-directory: packages/analytics-engine/browser

      - name: Run integration tests
        run: pnpm test:integration:analytics

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analytics-engine-playwright-report
          path: packages/analytics-engine/browser/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analytics-engine-browser-test-results
          path: packages/analytics-engine/browser/test-results/
          retention-days: 30

  notify-discord:
    if: always() && github.event_name != 'pull_request' && (needs.vetra-e2e-tests.result == 'failure' || needs.vetra-e2e-worker-tests.result == 'failure' || needs.package-e2e-tests.result == 'failure')
    runs-on: ubuntu-24.04
    needs: [vetra-e2e-tests, vetra-e2e-worker-tests, package-e2e-tests]
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_FAILURES }}
          DISCORD_USER_MAPPING: ${{ secrets.DISCORD_USER_MAPPING }}
          VETRA_RESULT: ${{ needs.vetra-e2e-tests.result }}
          VETRA_WORKER_RESULT: ${{ needs.vetra-e2e-worker-tests.result }}
          PACKAGE_RESULT: ${{ needs.package-e2e-tests.result }}
        run: |
          DISCORD_USER=$(echo "$DISCORD_USER_MAPPING" | jq -r --arg GH_USER "${{ github.actor }}" '.[$GH_USER] // ""')
          MENTION_STRING=""
          if [ ! -z "$DISCORD_USER" ]; then
            MENTION_STRING="<@${DISCORD_USER}> "
          fi

          FAILED_JOBS=""
          if [ "$VETRA_RESULT" = "failure" ]; then
            FAILED_JOBS="Vetra E2E"
          fi
          if [ "$VETRA_WORKER_RESULT" = "failure" ]; then
            if [ -z "$FAILED_JOBS" ]; then
              FAILED_JOBS="Vetra E2E (worker)"
            else
              FAILED_JOBS="$FAILED_JOBS, Vetra E2E (worker)"
            fi
          fi
          if [ "$PACKAGE_RESULT" = "failure" ]; then
            if [ -z "$FAILED_JOBS" ]; then
              FAILED_JOBS="Package E2E"
            else
              FAILED_JOBS="$FAILED_JOBS, Package E2E"
            fi
          fi

          curl -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" -d '{
            "embeds": [{
              "title": "⚠️ E2E Tests Failed",
              "description": "**Author:** '"${MENTION_STRING}"'\n**Commit:** [`${{ github.event.head_commit.message }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) \n**Failed jobs:** '"${FAILED_JOBS}"'\n**Workflow run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
              "color": 16711680
            }]
          }'
