name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual triggering for testing
  workflow_dispatch:

env:
  NX_ISOLATE_PLUGINS: false
  HUSKY: 0

concurrency:
  group: e2e-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vetra-e2e-tests:
    name: Run Vetra E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install-ci

      - name: Setup bun global install
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Build typescript project
        run: pnpm tsc -b
        working-directory: "./test/vetra-e2e"

      - name: Run misc build scripts
        run: pnpm build-misc

      - name: Run bundle scripts
        run: pnpm build-bundle

      - name: Run css build scripts
        run: pnpm build-css

      - name: Run vite build scripts
        run: pnpm build-vite

      - name: Run build clis
        run: pnpm build-cli

      - name: Run install again after generating binaries
        run: pnpm install-ci

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: ./test/vetra-e2e

      - name: Run Playwright tests
        run: pnpm test:e2e
        working-directory: ./test/vetra-e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vetra-playwright-report
          path: test/vetra-e2e/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vetra-test-results
          path: test/vetra-e2e/test-results/
          retention-days: 30

  analytics-engine-e2e-tests:
    name: Run Analytics Engine E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install-ci

      - name: Setup bun global install
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Build typescript project
        run: pnpm tsc -b

      - name: Run misc build scripts
        run: pnpm build-misc

      - name: Run bundle scripts
        run: pnpm build-bundle

      - name: Run css build scripts
        run: pnpm build-css

      - name: Run vite build scripts
        run: pnpm build-vite

      - name: Run build clis
        run: pnpm build-cli

      - name: Run install again after generating binaries
        run: pnpm install-ci

      - name: Install Playwright Browsers
        run: pnpm exec playwright install
        working-directory: packages/analytics-engine/browser

      - name: Run Playwright tests
        run: pnpm test:e2e
        working-directory: packages/analytics-engine/browser

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vetra-playwright-report
          path: packages/analytics-engine/browser/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analytics-engine-browser-test-results
          path: packages/analytics-engine/browser/test-results/
          retention-days: 30

  notify-discord:
    if: always() && github.event_name != 'pull_request' && needs.vetra-e2e-tests.result == 'failure'
    runs-on: ubuntu-24.04
    needs: [vetra-e2e-tests]
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_FAILURES }}
          DISCORD_USER_MAPPING: ${{ secrets.DISCORD_USER_MAPPING }}
          VETRA_RESULT: ${{ needs.vetra-e2e-tests.result }}
        run: |
          DISCORD_USER=$(echo "$DISCORD_USER_MAPPING" | jq -r --arg GH_USER "${{ github.actor }}" '.[$GH_USER] // ""')
          MENTION_STRING=""
          if [ ! -z "$DISCORD_USER" ]; then
            MENTION_STRING="<@${DISCORD_USER}> "
          fi

          FAILED_JOBS="Vetra E2E"

          curl -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" -d '{
            "embeds": [{
              "title": "⚠️ E2E Tests Failed",
              "description": "**Author:** '"${MENTION_STRING}"'\n**Commit:** [`${{ github.event.head_commit.message }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) \n**Failed jobs:** '"${FAILED_JOBS}"'\n**Workflow run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
              "color": 16711680
            }]
          }'
