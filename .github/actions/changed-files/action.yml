name: Changed files (for vitest related)
description: Outputs a space-separated list of changed files for PR/push/workflow_dispatch. For PRs, diffs the entire PR against the base branch.

outputs:
  files:
    description: Space-separated changed files
    value: ${{ steps.diff.outputs.files }}

runs:
  using: composite
  steps:
    - id: diff
      shell: bash
      run: |
        set -euo pipefail

        EVENT_NAME="${{ github.event_name }}"
        PR_ACTION="${{ github.event.action || '' }}"

        BASE=""
        HEAD=""

        if [[ "$EVENT_NAME" == "pull_request" ]]; then
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

        elif [[ "$EVENT_NAME" == "push" ]]; then
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"

        else
          BASE="$(git rev-parse HEAD~1)"
          HEAD="$(git rev-parse HEAD)"
        fi

        # support commit amends and force push
        if [[ "$BASE" =~ ^0+$ ]] || ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
          echo "BASE '$BASE' is missing or invalid; falling back to HEAD parent."
          BASE="$(git rev-parse "$HEAD^" 2>/dev/null || echo "")"
        fi

        if [[ -z "$BASE" ]]; then
          echo "No usable BASE; treating all tracked files as unchanged."
          FILES=""
        else
          FILES="$(git diff --name-only --diff-filter=ACMR "$BASE" "$HEAD")"
        fi

        echo "Event:  $EVENT_NAME"
        echo "Action: $PR_ACTION"
        echo "Base:   $BASE"
        echo "Head:   $HEAD"
        echo "Changed files:"
        echo "$FILES"

        echo "files=$(echo "$FILES" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
