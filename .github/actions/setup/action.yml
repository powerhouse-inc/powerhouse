name: Setup
description: Set up the required environment for running actions in the Powerhouse monorepo.
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: https://registry.npmjs.org

    - name: Setup pnpm with cache
      uses: pnpm/action-setup@v4
      with:
        version: latest
        run_install: false

    - name: Setup bun global install
      uses: oven-sh/setup-bun@v2

    - name: Install with frozen lockfile
      shell: bash
      run: pnpm install-ci

    - name: Build
      shell: bash
      run: pnpm build

    - name: Run install again after generating binaries
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Build packages that depend on generated binaries
      shell: bash
      run: pnpm --filter=@powerhousedao/versioned-documents --no-bail run build
